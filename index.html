<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Image Slider</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="relative w-full max-w-xl mx-auto mt-10">
	<!-- Images -->
	<div id="slider" class="relative overflow-hidden rounded-lg shadow-lg h-64">
	<!-- Images Container -->
   <img src="https://picsum.photos/id/1015/800/400" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700 slider-img">
    <img src="https://picsum.photos/id/1016/800/400" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700 slider-img">
    <img src="https://picsum.photos/id/1018/800/400" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700 slider-img">
    <img src="https://picsum.photos/id/1020/800/400" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700 slider-img">
	</div>

	<!-- Previous/Next Buttons -->
<button id="prev" class="absolute top-1/2 left-2 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">❮</button>
<button id="next" class="absolute top-1/2 right-2 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">❯</button>

<!-- Dots -->
<div id="dots" class="flex justify-center mt-3 space-x-2">
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
