<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Image Slider</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="max-w-3xl mx-auto mt-10">
  
  <!-- Main Slider -->
  <div id="slider" class="relative overflow-hidden rounded-xl shadow-lg h-72 group">
    
    <!-- Slide 1 -->
    <div class="slide absolute inset-0 opacity-0 transition duration-700">
      <img src="https://picsum.photos/id/1015/800/400" class="w-full h-full object-cover">
      <div class="absolute bottom-0 bg-black/50 text-white p-4 w-full">
        <h2 class="text-lg font-bold">Mountain View</h2>
        <p>Beautiful nature scenery</p>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide absolute inset-0 opacity-0 transition duration-700">
      <img src="https://picsum.photos/id/1016/800/400" class="w-full h-full object-cover">
      <div class="absolute bottom-0 bg-black/50 text-white p-4 w-full">
        <h2 class="text-lg font-bold">Sea Beach</h2>
        <p>Relaxing ocean waves</p>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide absolute inset-0 opacity-0 transition duration-700">
      <img src="https://picsum.photos/id/1018/800/400" class="w-full h-full object-cover">
      <div class="absolute bottom-0 bg-black/50 text-white p-4 w-full">
        <h2 class="text-lg font-bold">City Lights</h2>
        <p>Night city skyline</p>
      </div>
    </div>

    <!-- Buttons -->
    <button id="prev" class="absolute left-3 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full hidden group-hover:block">❮</button>
    <button id="next" class="absolute right-3 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full hidden group-hover:block">❯</button>
  </div>

  <!-- Dots -->
  <div id="dots" class="flex justify-center mt-4 space-x-2"></div>

  <!-- Thumbnails -->
  <div id="thumbs" class="flex justify-center mt-4 space-x-2"></div>

</div>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 bg-black/90 hidden items-center justify-center">
  <img id="lightbox-img" class="max-w-full max-h-full">
</div>

<script src="script.js"></script>
</body>
</html>
