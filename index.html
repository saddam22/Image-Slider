<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Image Slider</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="relative w-full max-w-x1 mx-auto mt-10">
	<!-- Images Container -->
	<img src="https://picsum.photos/id/1015/800/400" class="w-full h-64 object-cover slider-img active">
	<img src="https://picsum.photos/id/1016/800/400" class="w-full h-64 object-cover slider-img">
    <img src="https://picsum.photos/id/1018/800/400" class="w-full h-64 object-cover slider-img">
    <img src="https://picsum.photos/id/1020/800/400" class="w-full h-64 object-cover slider-img">
</div>

<!-- Previous/Next Buttons -->
<button class="absolute top-1/2 left-2 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">❮</button>
<button class="absolute top-1/2 right-2 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">❯</button>

<!-- Dots -->
<div id="dots" class="flex justify-center mt-3 space-x-2">
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
	<span class="dot w-3 h-3 rounded-full bg-gray-400 cursor-pointer"></span>
</div>

<script src="script.js"></script>
</body>
</html>
